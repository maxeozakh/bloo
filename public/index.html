<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bloo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f0e8;
        --card: #fffaf4;
        --text: #2d241d;
        --muted: #746354;
        --accent: #bf5a36;
        --line: rgba(45, 36, 29, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(191, 90, 54, 0.14), transparent 28%),
          linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
      }
      a { color: var(--accent); }
      .hero, .stack, .post {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
      }
      .hero {
        padding: 72px 0 32px;
      }
      .eyebrow, .meta, .footer {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.75rem;
      }
      h1, h2 {
        line-height: 1.05;
      }
      h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        margin: 0 0 12px;
      }
      .lede {
        font-size: 1.15rem;
        max-width: 42rem;
      }
      .stack {
        display: grid;
        gap: 16px;
        padding-bottom: 48px;
      }
      .card, .post {
        background: color-mix(in srgb, var(--card) 92%, white);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 12px 40px rgba(45, 36, 29, 0.06);
      }
      .post {
        margin-top: 48px;
        margin-bottom: 48px;
      }
      .prose {
        font-size: 1.1rem;
        line-height: 1.8;
      }
      .prose img {
        max-width: 100%;
      }
      code {
        background: rgba(45, 36, 29, 0.06);
        padding: 0.12rem 0.3rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">Auto-publishing blog</p>
      <h1>Bloo</h1>
      <p class="lede">A quiet auto-publishing blog.</p>
    </header>
    <main class="stack">
            <article class="card">
              <p class="meta">Thu Apr 02 2026 02:00:00 GMT+0200 (Central European Summer Time)</p>
              <h2><a href="./hello-world/">Hello World</a></h2>
              <p>This is the first Bloo post.</p>
            </article>
          </main>
  </body>
</html>
